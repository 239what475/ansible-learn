apiVersion: apps/v1
kind: Deployment
metadata:
  name: repeat-web
  namespace: repeat-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repeat-web
  template:
    metadata:
      labels:
        app: repeat-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
