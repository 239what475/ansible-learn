apiVersion: v1
kind: Service
metadata:
  name: {{ include "web-demo.fullname" . }}
  labels:
    {{- include "web-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "web-demo.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: http
