[defaults]
# 默认使用当前目录里的 inventory.yml。
inventory = ./inventory.yml

# 第一次连接新主机时，不因为 SSH host key 检查而中断。
host_key_checking = False

# 让 Ansible 自动选择目标机器上的 Python 解释器，并尽量少输出相关警告。
interpreter_python = auto_silent

# 不生成 .retry 文件，避免目录里出现额外的运行产物。
retry_files_enabled = False

# 指定本地临时目录，避免把运行时文件写到家目录下的 ~/.ansible/tmp。
local_tmp = ./.ansible/tmp

[privilege_escalation]
# 默认不对所有任务都自动提权，需要时在 playbook 里显式写 become: true。
become = False

# 提权方式使用 sudo。
become_method = sudo

# 这里关闭交互式密码输入，配合我们前面配置的免密 sudo 使用。
become_ask_pass = False
