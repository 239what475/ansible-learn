[defaults]
# 默认读取当前目录下的 inventory.yml。
inventory = ./inventory.yml
# 关闭首次 SSH 连接时的 host key 检查，避免教程初次运行时被交互提示打断。
host_key_checking = False
# 自动选择目标主机上的 Python 解释器，并尽量减少无关提示。
interpreter_python = auto_silent
# 不再把 facts 注入为顶层变量，统一通过 ansible_facts[...] 读取。
inject_facts_as_vars = False
# 不生成 .retry 文件，保持教程目录更干净。
retry_files_enabled = False
# 把 Ansible 在本地运行时产生的临时文件放到当前目录里，避免写到用户家目录。
local_tmp = ./.ansible/tmp

[privilege_escalation]
# 默认不对所有任务都自动提权，需要时在 playbook 里显式写 become: true。
become = False
# 当前实验环境里，如果需要提权，默认通过 sudo。
become_method = sudo
# 这里不使用交互式 sudo 密码。
become_ask_pass = False
