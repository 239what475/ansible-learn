- name: Consume Terraform handoff on localhost
  # 这一章这里不再自己写死容器名、端口、URL。
  # 这些值都由 Terraform 先生成，再通过 `generated/terraform_vars.yml` 交给 Ansible。
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Load Terraform generated vars file
      # `include_vars` 可以先理解成“运行时加载一份变量文件”。
      # 这里加载的就是 Terraform 交过来的第二份文件。
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../generated/terraform_vars.yml"

    - name: Explain Terraform and Ansible division
      ansible.builtin.debug:
        msg:
          - "Terraform creates resources and writes handoff files."
          - "Ansible reads those files and continues the workflow."
          - "terraform_container_name = {{ terraform_container_name }}"
          - "terraform_site_url = {{ terraform_site_url }}"

    - name: Build one final report on the Ansible side
      # 这里故意让 Ansible 再生成一份报告文件。
      # 这样你可以更清楚地看到：Terraform 交接之后，Ansible 还可以继续做自己的工作。
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../generated/ansible_report.yml"
        mode: "0644"
        content: |
          terraform_project_name: {{ terraform_project_name }}
          terraform_environment_name: {{ terraform_environment_name }}
          terraform_container_name: {{ terraform_container_name }}
          terraform_network_name: {{ terraform_network_name }}
          terraform_site_url: {{ terraform_site_url }}
          terraform_published_port: {{ terraform_published_port }}
          report_generated_by: ansible

    - name: Read final Ansible report
      ansible.builtin.command: cat "{{ playbook_dir }}/../../generated/ansible_report.yml"
      register: ansible_report
      changed_when: false

    - name: Show final Ansible report
      ansible.builtin.debug:
        var: ansible_report.stdout_lines
