- name: Learn secrets and vault on Incus nodes
  # 这一章会把敏感变量写进远程文件，所以直接在 play 层开启 `become: true`。
  hosts: incus_nodes
  gather_facts: false
  become: true

  vars:
    lesson_name: 22-secrets-and-vault
    remote_secret_dir: /home/ubuntu/ansible-vault-demo
    remote_secret_file: "{{ remote_secret_dir }}/secret.env"

  vars_files:
    # `vars_files` 表示在任务开始前先加载变量文件。
    # 这一章里这里指向本地的 `vault.yml`；它在第一次复制出来时还是明文，
    # 执行 `ansible-vault encrypt vault.yml` 之后，就会变成加密文件。
    # Ansible 运行 playbook 时会先解密它，再把里面的变量注入到当前 play。
    #
    # 所以要区分两层：
    # - 磁盘上的 `vault.yml`：是密文文件；
    # - play 运行时的 `vault_demo_message` / `vault_demo_token`：已经是解密后的普通字符串变量。
    # 这些变量之所以能被成功解密，前提之一就是 Ansible 能拿到 `ansible.cfg` 里配置的 `.vault_pass.txt` 密码文件。
    # 如果找不到这个文件，或者密码不对，那么这里的 `vault.yml` 就无法被加载。
    # 后面的任务之所以能对它们取长度、拼接、写文件，就是因为运行时拿到的是明文值。
    - vault.yml

  tasks:
    - name: Explain vault and no_log
      ansible.builtin.debug:
        msg:
          - "`ansible-vault` 解决的是：敏感变量在磁盘上如何安全保存。"
          - "`no_log: true` 解决的是：任务执行时不要把敏感值打印到终端和日志里。"
          - "可以先把它们理解成：一个保护静态文件，一个保护运行时输出。"
      run_once: true

    - name: Ensure remote secret directory exists
      ansible.builtin.file:
        path: "{{ remote_secret_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0700'

    - name: Show one no_log task without leaking values
      # `no_log: true` 不会加密变量，它只是把这条任务的参数和结果从输出里隐藏掉。
      # 所以这里即使引用了 `vault_demo_token`，终端里也不会直接打印它。
      ansible.builtin.debug:
        msg: "vault_demo_token = {{ vault_demo_token }}"
      no_log: true

    - name: Write one secret env file from vaulted variables
      # 这里真正用到了 `vault.yml` 里的变量。
      # 因为内容里包含敏感值，所以整个任务也加 `no_log: true`。
      # `mode: '0600'` 表示只有 owner 可读写，适合更私密的文件。
      ansible.builtin.copy:
        dest: "{{ remote_secret_file }}"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          vault_demo_message={{ vault_demo_message }}
          vault_demo_token={{ vault_demo_token }}
      no_log: true

    - name: Read metadata of secret file
      # `stat` 只看文件元信息，不会把文件内容打印出来。
      ansible.builtin.stat:
        path: "{{ remote_secret_file }}"
      register: secret_file_stat

    - name: Show one proof that vaulted vars are plaintext at runtime
      # 这个例子想证明的是：
      # - `vault.yml` 在磁盘上虽然是密文；
      # - 但一旦被 Ansible 成功加载，变量在运行时已经是普通字符串。
      #
      # 所以这里可以直接对它们做普通字符串操作：
      # - `upper`：把消息转成大写；
      # - `length`：取 token 长度；
      # - `'*' * 长度`：构造一个同长度的掩码字符串；
      # - 甚至也可以直接把 token 当成普通字符串打印出来。
      #
      # 注意：下面这条明文打印只适合教学演示，用来证明“运行时变量已经是明文”。
      # 在真实项目里，通常不应该这样做，而应该继续配合 `no_log: true` 或只打印派生信息。
      ansible.builtin.debug:
        msg:
          - "vault_demo_message_upper = {{ vault_demo_message | upper }}"
          - "vault_demo_token_masked = {{ '*' * (vault_demo_token | length) }}"
          - "vault_demo_token_plaintext = {{ vault_demo_token }}"

    - name: Show safe derived info only
      # 这里故意只展示“安全信息”：
      # - 文件是否存在、权限是多少；
      # - 解密后变量值的长度。
      # 不直接把真正的秘密值打印出来。
      ansible.builtin.debug:
        msg:
          - "inventory_hostname = {{ inventory_hostname }}"
          - "secret_file_exists = {{ secret_file_stat.stat.exists }}"
          - "secret_file_mode = {{ secret_file_stat.stat.mode }}"
          - "vault_demo_message_length = {{ vault_demo_message | length }}"
          - "vault_demo_token_length = {{ vault_demo_token | length }}"
